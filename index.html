<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0b1a27">
<title>CGA Güvenlik Sistemleri - Giriş Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">

<style>
:root {
  color-scheme: dark;
  --cga-bg-main: #000000; /* Saf Siyah */
  --cga-bg-secondary: #080808; /* Çok koyu gri */
  --cga-gold: #f1c40f;
  /* ELITE NEON GÜNCELLEMESİ */
  --cga-neon: #CCFF00; 
  --cga-neon-dark: #b8e600;
  --cga-text-main: #ffffff;
  --cga-card-bg: rgba(255,255,255,0.03); /* Kartı daha şeffaf yapalım siyahla bütünleşsin */
  --cga-border-soft: rgba(255,255,255,0.08);
}

html, body {
  margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
  font-family: 'Montserrat', sans-serif;
  display: flex; justify-content: center; align-items: center;
  background: radial-gradient(circle at top, rgba(204, 255, 0, 0.05), transparent 40%),
              linear-gradient(135deg, var(--cga-bg-main), var(--cga-bg-secondary));
  color: var(--cga-text-main);
  -webkit-touch-callout: none;
}

.container {
  width: 380px;
  padding: 40px 30px 70px;
  border-radius: 26px;
  background: var(--cga-card-bg);
  backdrop-filter: blur(22px);
  box-shadow: 0 0 0 1px var(--cga-border-soft), 0 20px 50px rgba(0,0,0,0.7);
  text-align: center;
  transform: translateY(-20px);
}

h1 { font-size:26px; font-weight:800; color: var(--cga-gold); margin-bottom:8px; cursor:pointer; }

.site-name{
  display:none; font-size:28px; font-weight:800; letter-spacing:1px; margin:1px 0 18px;
  color: var(--cga-neon); 
  text-shadow: 0 0 10px rgba(204, 255, 0, 0.6), 0 0 25px rgba(204, 255, 0, 0.4);
}

.input-group { display:none; flex-direction:column; text-align:left; margin-bottom:28px; }
.input-group.active { display:flex; }

input[type="text"], input[type="password"] { width:100%; padding:12px; margin:8px 0; border-radius:12px; border:none; background: rgba(255,255,255,0.1); color:white; font-size:14px;}
input::placeholder { color: rgba(236,240,241,0.6); }

.remember {display:flex; align-items:center; gap:8px; font-size:14px; margin-top:8px;}
.remember input[type="checkbox"] { cursor:pointer; accent-color: var(--cga-neon); }
.remember label { cursor:pointer; color:#fff; }

.loginBtn {
  width: 150px;
  padding: 13px;
  border: none;
  border-radius: 16px;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  margin-bottom: 0;
  background: linear-gradient(90deg, var(--cga-neon-dark), var(--cga-neon));
  box-shadow: 0 6px 20px rgba(204, 255, 0, 0.35);
  transition: 0.25s;
  color: #000;
}
.loginBtn:hover {
  background: linear-gradient(90deg, var(--cga-neon), var(--cga-neon-dark));
  transform: translateY(-2px) scale(1.05);
}

.message {
  margin-top:15px;
  margin-bottom:40px;
  color:#e74c3c;
  font-weight:600;
  text-align:center;
  min-height:20px;
}

.cga-logo { 
  width: 220px; /* Bir tık daha küçülttüm */
  max-width: 70%; 
  display: block; 
  margin: 55px auto 0; 
  filter: drop-shadow(0 0 12px rgba(241, 196, 15, 0.15));
}
/* --- YENİ NESİL ALT İMZA (FOOTER) --- */
.corner-bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 25px;
  background: rgba(0, 0, 0, 0.3); /* Çok hafif şeffaf siyah */
  backdrop-filter: blur(5px); /* Cam efekti */
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.2px;
  color: rgba(241, 196, 15, 0.7); /* Altın sarısı ama hafif şeffaf */
  border-top: 1px solid rgba(255, 255, 255, 0.05);
  text-transform: uppercase;
  user-select: none;
  pointer-events: none;
  z-index: 50;
}

/* Yazının ortasında parlayan bir efekt */
.corner-bottom span {
  color: #f1c40f;
  text-shadow: 0 0 8px rgba(241, 196, 15, 0.3);
  margin: 0 4px;
}
.corner-top {
  position: fixed;
  top: 10px;
  right: 14px;
  font-size: 10px;
  font-weight: 700; /* Biraz daha kalın */
  /* KRİTİK DEĞİŞİKLİK: Gri yerine parlak altın sarısı */
  color: var(--cga-gold); 
  opacity: 1; /* Tam belirginlik (şeffaflık yok) */
  text-shadow: 0 0 5px rgba(241, 196, 15, 0.4); /* Hafif parlama efekti */
  user-select: none;
  pointer-events: none;
  z-index: 50;
}

.securityText{
  font-size:16px; font-weight:700; color: var(--cga-gold); margin-bottom:20px; cursor:pointer; text-align:center;
  padding:8px 0; letter-spacing:0.5px; transition:0.25s;
}
.securityText:hover{ transform: scale(1.06); color:#f7d35e; }

#qr-reader {
  width: 95vw;
  height: 70vh;
  max-width: 600px;
  max-height: 600px;
  margin: auto;
  border-radius: 12px;
  background: #000;
}

.modal-content { max-width: 95%; }
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.modal.hidden { display: none; }

.modal-box {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 12px;
  width: 85%;
  max-width: 320px;
  text-align: center;
  color: #fff;
}

.modal-actions {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

.modal-actions button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

#cancelDisconnect { background: #555; color: #fff; }
#confirmDisconnect { background: #e74c3c; color: #fff; }

.disconnect-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.disconnect-modal.hidden { display: none; }

* { -webkit-user-select: none; -ms-user-select: none; user-select: none; }
input, textarea {
  -webkit-user-select: text !important;
  user-select: text !important;
  -webkit-touch-callout: default;
  pointer-events: auto;
}


.choiceBtn {
  flex:1;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  background: rgba(255,255,255,0.1);
  color:#fff;
  transition:0.25s;
}
.choiceBtn:hover { background: rgba(204, 255, 0, 0.2); transform: scale(1.05); }
.choiceBtn.active { background: linear-gradient(90deg, var(--cga-neon-dark), var(--cga-neon)); color:#000; }

.modal { position: fixed; inset:0; background: rgba(0,0,0,0.55); display:flex; align-items:center; justify-content:center; z-index:9999; transition:0.3s; }
.modal.hidden { display:none; }
.modal-box { background:#1e1e1e; border-radius:12px; color:#fff; }

/* GİRİŞ YAP BUTONU - ELITE NEON EDITION */
#secLoginBtn {
    width: 80%; /* Biraz daha geniş, daha güven verici */
    max-width: 280px;
    padding: 16px 0;
    margin: 25px auto 0;
    display: block;
    
    /* Tipografi */
    font-size: 18px;
    font-weight: 900; 
    text-transform: uppercase;
    letter-spacing: 2px;
    font-family: 'Montserrat', sans-serif;
    
    /* Renk ve Tasarım - Senin Neon Rengin */
    background-color: var(--cga-neon); 
    color: #000000; /* Saf siyah yazı ile maksimum kontrast */
    border-radius: 20px;
    border: none;
    cursor: pointer;
    
    /* Neon Glow (Parlama) Efekti */
    /* Katmanlı gölge sayesinde butonun altından ışık sızıyor gibi durur */
    box-shadow: 0 0 15px rgba(204, 255, 0, 0.4), 
                0 10px 30px rgba(0, 0, 0, 0.5);
    
    /* Akıcı Animasyon */
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    overflow: hidden;
    z-index: 1;
}

/* Üzerine Gelince Parlamayı Artır */
#secLoginBtn:hover {
    transform: translateY(-4px) scale(1.02);
    background-color: #d9ff33; /* Hafif daha açık neon */
    box-shadow: 0 0 25px rgba(204, 255, 0, 0.6), 
                0 15px 40px rgba(0, 0, 0, 0.6);
}

/* Tıklama Hissiyatı */
#secLoginBtn:active {
    transform: scale(0.96);
    box-shadow: 0 0 10px rgba(204, 255, 0, 0.3);
}

/* Butonun içinden geçen hafif bir parlama çizgisi (Opsiyonel Elite Efekt) */
#secLoginBtn::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 20%;
    height: 200%;
    background: rgba(255, 255, 255, 0.4);
    transform: rotate(30deg);
    transition: all 0.6s;
    opacity: 0.1;
}

#secLoginBtn:hover::after {
    left: 120%;
}

/* Yükleniyor/Pasif Durumu */
#secLoginBtn:disabled {
    background: #1a1a1a !important;
    color: #444 !important;
    box-shadow: none !important;
    cursor: not-allowed;
    transform: none !important;
}
/* --- HAVALI DÖNEN DESTEK PANELİ (TAMİR EDİLDİ) --- */
.support-wrapper {
  position: fixed;
  bottom: 30px;
  right: 20px;
  z-index: 10000;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 15px;
  /* KRİTİK: Kapsayıcı artık arkadaki giriş butonunu engellemez */
  pointer-events: none; 
}

/* Yuvarlak Buton ve Yazı Grubu */
.support-item {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  opacity: 0;
  transform: translateY(20px) scale(0) rotate(-180deg);
  transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  /* Kapalıyken tıklanamaz */
  pointer-events: none;
}

.support-wrapper.active .support-item {
  opacity: 1;
  transform: translateY(0) scale(1) rotate(0deg);
  /* Açıkken tıklanabilir */
  pointer-events: auto;
}

/* Yanlardaki Açıklama Yazıları */
.support-label {
  background: rgba(11, 26, 39, 0.9);
  color: #f1c40f;
  padding: 5px 12px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  border: 1px solid rgba(241, 196, 15, 0.3);
}

/* Yuvarlak İkonlar */
.support-icon {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
  color: white;
}

.btn-whatsapp-icon { background: #25D366; }
.btn-call-icon { background: #3498db; }

/* Ana Yuvarlak Buton */
.main-support-btn {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f1c40f, #d4ac0d);
  color: #0b1a27;
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 9px;
  box-shadow: 0 8px 25px rgba(241, 196, 15, 0.5);
  transition: 0.4s;
  /* Butonun kendisine basılabilmesi şart */
  pointer-events: auto;
}

.main-support-btn span.emoji { font-size: 24px; margin-bottom: -2px; }

/* Aktifken Kırmızı X Olma ve Dönme */
.support-wrapper.active .main-support-btn {
  transform: rotate(135deg);
  background: #e74c3c;
  color: #fff;
}
/* Şifre kutusunun konumunu ayarla */
.password-wrapper {
  position: relative;
  width: 100%;
}

/* Göz ikonunun stili */
.toggle-password {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: var(--cga-neon);
  font-size: 18px;
  z-index: 10;
  user-select: none;
}
</style>
</head>
<body>

<div class="container">
  <img src="logo.png" class="cga-logo" alt="CGA Logo">

  <div id="qrButtonsWrapper" style="display:flex; gap:8px; justify-content:center; align-items:center; background: rgba(255,255,255,0.05); padding:6px 8px; border-radius:12px; max-width:300px; margin:auto;">
    <button id="startQR" class="choiceBtn active" style="font-size:14px; padding:6px 10px;">📷 QR Kodu Okut</button>
    <button id="enterCode" class="choiceBtn" style="font-size:14px; padding:6px 10px;">⌨️ Kod Gir</button>
  </div>

  <div style="margin-top:10px; text-align:center;">
    <div id="siteName" class="site-name" style="font-size:24px;"></div>
    <div id="qrMessage" style="margin-top:4px; color:#f1c40f; font-size:14px;"></div>
  </div>

  <div id="codeModal" class="modal hidden">
    <div class="modal-box" style="padding:20px; max-width:300px; text-align:center;">
      <h3 style="margin-bottom:12px; color:#f1c40f;">Site Kodunu Gir</h3>
      <input id="codeInput" type="text" maxlength="4" placeholder="0000" style="width:60%; padding:8px; border-radius:8px; border:none; text-align:center; font-size:16px;">
      <div style="margin-top:16px; display:flex; gap:10px; justify-content:center;">
        <button id="codeCancel" class="loginBtn" style="padding:6px 12px; font-size:14px;">İptal</button>
        <button id="codeConfirm" class="loginBtn" style="padding:6px 12px; font-size:14px;">Onayla</button>
      </div>
    </div>
  </div>

  <div id="qrModal" class="modal hidden">
      <div class="modal-content">
        <div id="qr-reader"></div>
        <button id="closeQRModal" class="loginBtn">Kapat</button>
      </div>
    </div>

  <div class="securityText" id="securityBtn">🔐 Kullanıcı Girişi</div>

  <div id="securityGroup" class="input-group active">
    <input type="text" id="secUsername" placeholder="Kullanıcı Adı">
    <input type="password" id="secPassword" placeholder="Şifre">
    <div class="remember">
      <input type="checkbox" id="secRemember">
      <label for="secRemember">Kullanıcıyı hatırla</label>
    </div>
    <button class="loginBtn" id="secLoginBtn">Giriş Yap</button>
  </div>

  <div class="message" id="message"></div>
</div>

<div class="corner-bottom">© 2026 CGA Güvenlik Sistemleri</div>
<div class="corner-top">v1.2.1</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const merkezConfig = {
  apiKey: "AIzaSyDCJWz80wWlzNhaM2Qnw_e5UkQoc8DoJaU",
  authDomain: "merkez-14bf8.firebaseapp.com",
  databaseURL: "https://merkez-14bf8-default-rtdb.firebaseio.com", 
  projectId: "merkez-14bf8",
  storageBucket: "merkez-14bf8.firebasestorage.app",
  messagingSenderId: "512943111807",
  appId: "1:512943111807:web:675c769c7ede48216e494a",
  measurementId: "G-BYS8FPKY7H"
};
const merkezApp = getApps().find(a => a.name === "[DEFAULT]") || initializeApp(merkezConfig);
const merkezDB = getDatabase(merkezApp);

const siteNameEl = document.getElementById("siteName");
const securityBtn = document.getElementById("securityBtn");
const msg = document.getElementById("message");
const secUsername = document.getElementById("secUsername");
const secPassword = document.getElementById("secPassword");
const secRemember = document.getElementById("secRemember");

const qrBtn = document.getElementById("startQR");
const codeBtn = document.getElementById("enterCode");
const codeModal = document.getElementById("codeModal");
const codeInput = document.getElementById("codeInput");
const codeCancel = document.getElementById("codeCancel");
const codeConfirm = document.getElementById("codeConfirm");
const qrModal = document.getElementById("qrModal");
const closeQRModal = document.getElementById("closeQRModal");
let qrReader = null;

function hideQRButtons(){
  qrBtn.style.display="none";
  codeBtn.style.display="none";
  document.getElementById("qrButtonsWrapper").style.display = "none";
}

function showQRButtons(){
  qrBtn.style.display="flex";
  codeBtn.style.display="flex";
  document.getElementById("qrButtonsWrapper").style.display = "flex";
}

window.addEventListener("load", async ()=>{
  securityBtn.click();
  const secStored = JSON.parse(localStorage.getItem("securityUser"));
  if(secStored){ 
    secUsername.value = secStored.username; 
    secPassword.value = secStored.password; 
    secRemember.checked = true; 
  }

  const savedSiteID = localStorage.getItem("siteID");
  const savedConfig = localStorage.getItem("siteConfig");
  if(savedSiteID && savedConfig){
    const siteConfig = JSON.parse(savedConfig);
    let siteApp = getApps().find(a=>a.name==`siteApp-${savedSiteID}`);
    if(!siteApp) siteApp = initializeApp(siteConfig, `siteApp-${savedSiteID}`);
    const siteDB = getDatabase(siteApp);
    hideQRButtons();
    await loadSiteName(siteDB);
  }
});

function prepareAuthEmail(userInput) {
    let clean = userInput.trim().replace(/\s+/g, '').toLowerCase();
    const map = {'ç':'c','ğ':'g','ı':'i','ö':'o','ş':'s','ü':'u','İ':'i'};
    clean = clean.replace(/[çğıöşüİ]/g, m => map[m]);
    return clean + "@cga.com";
}

async function loginUser(rawUsername, password){
    msg.textContent = "Bağlanılıyor...";
    msg.style.color = "#f1c40f";
    
    const usernameForDB = rawUsername.trim(); 
    const authEmail = prepareAuthEmail(rawUsername);
    password = password.trim();

    const siteConfig = localStorage.getItem("siteConfig") ? JSON.parse(localStorage.getItem("siteConfig")) : null;
    if(!siteConfig){ msg.textContent="Lütfen QR kodu okutunuz!"; msg.style.color="#e74c3c"; return; }
    if(!rawUsername || !password){ msg.textContent="Alanlar boş bırakılamaz!"; msg.style.color="#e74c3c"; return; }

    try {
        const siteId = localStorage.getItem("siteID");
        const appName = `siteApp-${siteId}`;
        let app = getApps().find(a=>a.name === appName) || initializeApp(siteConfig, appName);
        
        const activeAuth = getAuth(app);
        const activeDB = getDatabase(app);

        await signInWithEmailAndPassword(activeAuth, authEmail, password);

        const userSnap = await get(child(ref(activeDB),'users/' + usernameForDB));
        
        if(!userSnap.exists()){ 
            msg.textContent="Kullanıcı yetkisi bulunamadı!"; 
            msg.style.color="#e74c3c";
            return; 
        }
        
        const user = userSnap.val();

        // KRİTİK FİLTRE: SADECE RESIDENT
        if(user.type !== "resident") {
            msg.textContent = "Bu sayfaya giriş yetkiniz yoktur!";
            msg.style.color = "#e74c3c";
            await activeAuth.signOut(); // Yetkisi olmayanı hemen kovuyoruz
            return;
        }

        sessionStorage.setItem("currentUser", JSON.stringify({username: user.username, type: user.type}));

        if(secRemember.checked) localStorage.setItem("securityUser", JSON.stringify({username: rawUsername, password}));
        else localStorage.removeItem("securityUser");

        msg.textContent = "Giriş Başarılı!";
        msg.style.color = "#2ecc71";

        setTimeout(() => {
            window.location.href="site.html";
        }, 1000);

    } catch(err) { 
        console.error(err); 
        msg.style.color = "#e74c3c";
        msg.textContent = "Hatalı kullanıcı adı veya şifre!"; 
    }
}

document.getElementById("secLoginBtn").addEventListener("click", ()=> loginUser(secUsername.value, secPassword.value));

async function loadSiteName(db){
  try{
    const snap = await get(child(ref(db),"settings/siteName"));
    if(snap.exists()){
      const name=snap.val().trim();
      if(name!==""){ siteNameEl.textContent=name; siteNameEl.style.display="block"; }
    }
  }catch(e){ console.error("Site adı yüklenemedi", e); }
}

qrBtn.addEventListener("click", ()=>{
  setActive(qrBtn);
  qrModal.style.display = "flex";
  const qrDiv = document.getElementById("qr-reader");
  qrDiv.innerHTML = "";
  qrReader = new Html5Qrcode("qr-reader");
  const qrBoxSize = Math.min(window.innerWidth*0.8,300);
  qrReader.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: qrBoxSize },
    async (qrCodeMessage)=>{
      try{ await qrReader.stop(); }catch(e){}
      qrReader=null;
      qrModal.style.display = "none";
      await loadSiteConfig(qrCodeMessage);
      document.getElementById("qrMessage").textContent="İşlem başarılı, şimdi giriş yapabilirsiniz.";
    },
    (err)=>{ console.log("QR tarama:",err);}
  ).catch(err=>{
    alert("Kamera açılamadı: "+err);
    qrModal.style.display = "none";
  });
});

codeBtn.addEventListener("click", ()=>{
  setActive(codeBtn);
  codeModal.classList.remove("hidden");
  codeInput.value="";
  codeInput.focus();
});

codeCancel.addEventListener("click", ()=> codeModal.classList.add("hidden"));
codeConfirm.addEventListener("click", async ()=>{
  const code = codeInput.value.trim();
  if(!/^\d{4}$/.test(code)){ alert("Lütfen 4 haneli sayı girin!"); return; }
  codeModal.classList.add("hidden");
  await loadSiteConfig(code);
  document.getElementById("qrMessage").textContent="Kod başarıyla yüklendi, giriş yapabilirsiniz!";
});

let pressTimer;
siteNameEl.addEventListener("mousedown",()=>{ pressTimer=setTimeout(openDisconnectModal,800); });
siteNameEl.addEventListener("mouseup",()=>clearTimeout(pressTimer));
siteNameEl.addEventListener("mouseleave",()=>clearTimeout(pressTimer));
siteNameEl.addEventListener("touchstart",()=>{ pressTimer=setTimeout(openDisconnectModal,800); });
siteNameEl.addEventListener("touchend",()=>clearTimeout(pressTimer));

function disconnectProject(){
  localStorage.removeItem("siteID");
  localStorage.removeItem("siteConfig");
  sessionStorage.removeItem("currentUser");
  siteNameEl.textContent="";
  siteNameEl.style.display="none";
  showQRButtons();
  document.getElementById("qrMessage").textContent="Proje bağlantısından ayrıldınız.";
  msg.textContent="";
}

const disconnectModal = document.getElementById("disconnectModal");
const cancelDisconnect = document.getElementById("cancelDisconnect");
const confirmDisconnect = document.getElementById("confirmDisconnect");

function openDisconnectModal(){ disconnectModal.classList.remove("hidden"); }
function closeDisconnectModal(){ disconnectModal.classList.add("hidden"); }
cancelDisconnect.onclick = closeDisconnectModal;
confirmDisconnect.onclick = ()=>{ closeDisconnectModal(); disconnectProject(); };

function setActive(button){ [qrBtn, codeBtn].forEach(b=>b.classList.remove("active")); button.classList.add("active"); }

async function loadSiteConfig(inputCode){
  try{
    let siteID;
    if(/^\d{4}$/.test(inputCode)){
      const shortSnap = await get(child(ref(merkezDB), `shortCodes/${inputCode}`));
      if(!shortSnap.exists()){
        msg.textContent = "Kısa kod geçersiz!";
        showQRButtons();
        return null;
      }
      siteID = shortSnap.val();
    } else {
      siteID = inputCode;
    }

    const siteSnap = await get(child(ref(merkezDB), `sites/${siteID}/config`));
    if(!siteSnap.exists()){
      msg.textContent = "Site config bulunamadı!";
      showQRButtons();
      return null;
    }

    const siteConfig = siteSnap.val();
    let siteApp = getApps().find(a => a.name === `siteApp-${siteID}`);
    if(!siteApp) siteApp = initializeApp(siteConfig, `siteApp-${siteID}`);

    const siteDB = getDatabase(siteApp);
    localStorage.setItem("siteID", siteID);
    localStorage.setItem("siteConfig", JSON.stringify(siteConfig));
    hideQRButtons();
    await loadSiteName(siteDB);

    msg.textContent = "Site başarıyla yüklendi!";
    msg.style.color = "#2ecc71";
    return siteDB;

  } catch(err){
    console.error(err);
    msg.textContent = "Site yüklenirken hata oluştu!";
    showQRButtons();
  }
}

closeQRModal.addEventListener("click", async () => {
  if(qrReader){
    try {
      await qrReader.stop();
      qrReader.clear();
    } catch(e){
      console.error("QR durdurulamadı:", e);
    }
    qrReader = null;
  }
  qrModal.style.display = "none";
});

</script>

<div id="disconnectModal" class="disconnect-modal hidden">
  <div class="modal-box">
    <p>Proje bağlantısından ayrılmak istiyor musunuz?</p>
    <div class="modal-actions">
      <button id="cancelDisconnect">İptal</button>
      <button id="confirmDisconnect">Ayrıl</button>
    </div>
  </div>
</div>

<button id="installBtn" class="install-btn" style="position: fixed; top: 12px; left: 12px; font-size: 20px; display:none; z-index:500;">📲 Uygulamayı Yükle</button>

<script>
let deferredPrompt;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'block';
});

installBtn.addEventListener('click', async () => {
  installBtn.style.display = 'none';
  if(deferredPrompt){
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
  }
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(() => console.log('Service Worker kaydedildi.'))
      .catch(err => console.error('Service Worker hatası:', err));
  });
}
</script>
